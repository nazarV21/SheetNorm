services:
  sheetnorm:
    build: .
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-in-production}
      AI_BACKEND: ${AI_BACKEND:-fallback}
      AI_MODEL_PATH: ${AI_MODEL_PATH:-models/qwen2.5-3b-instruct-q4_k_m.gguf}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-50}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:5000,http://localhost:5000}
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./models:/app/models
      - ./training_examples:/app/training_examples
    restart: unless-stopped
