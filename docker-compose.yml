services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sheetnorm}
      POSTGRES_USER: ${POSTGRES_USER:-sheetnorm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sheetnorm}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sheetnorm} -d ${POSTGRES_DB:-sheetnorm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-in-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://sheetnorm:sheetnorm@postgres:5432/sheetnorm}
      DATA_STORE_BACKEND: ${DATA_STORE_BACKEND:-database}
      ASYNC_MODE: ${ASYNC_MODE:-rq}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RQ_QUEUE_NAME: ${RQ_QUEUE_NAME:-sheetnorm}
      STORAGE_ROOT: ${STORAGE_ROOT:-/app/storage}
      SCRIPT_EXECUTION_ENABLED: ${SCRIPT_EXECUTION_ENABLED:-true}
      AI_BACKEND: ${AI_BACKEND:-fallback}
      AI_MODEL_PATH: ${AI_MODEL_PATH:-models/qwen2.5-3b-instruct-q4_k_m.gguf}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-50}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:5000,http://localhost:5000}
      JOBS_FILE: /app/data/jobs.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./models:/app/models
      - ./training_examples:/app/training_examples
      - ./data:/app/data
      - ./storage:/app/storage
    restart: unless-stopped

  worker:
    build: .
    command: ["rq", "worker", "sheetnorm", "--url", "redis://redis:6379/0"]
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-in-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://sheetnorm:sheetnorm@postgres:5432/sheetnorm}
      DATA_STORE_BACKEND: ${DATA_STORE_BACKEND:-database}
      ASYNC_MODE: rq
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      STORAGE_ROOT: ${STORAGE_ROOT:-/app/storage}
      AI_BACKEND: ${AI_BACKEND:-fallback}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./models:/app/models
      - ./training_examples:/app/training_examples
      - ./data:/app/data
      - ./storage:/app/storage
    restart: unless-stopped

  script-runner:
    build: .
    command: ["python", "-m", "app.scripts_runtime.service"]
    environment:
      SCRIPT_EXECUTION_ENABLED: ${SCRIPT_EXECUTION_ENABLED:-true}
      SCRIPT_TIMEOUT_SECONDS: ${SCRIPT_TIMEOUT_SECONDS:-30}
      SCRIPT_MAX_MEMORY_MB: ${SCRIPT_MAX_MEMORY_MB:-512}
      SCRIPT_MAX_OUTPUT_ROWS: ${SCRIPT_MAX_OUTPUT_ROWS:-1000000}
      SCRIPT_MAX_OUTPUT_COLUMNS: ${SCRIPT_MAX_OUTPUT_COLUMNS:-500}
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
